# Montage Pacing Configuration
# Adjust these values to control the feel of the video montage.
# All durations are in seconds.

pacing:
  # Genre preset — applies tuned defaults for a music style (FEAT-027)
  # Options: bachata, salsa, reggaeton, kizomba, merengue, pop
  # Explicit values below will override the preset.
  # genre: bachata
  # Hard floor — no clip will ever be shorter than this
  min_clip_seconds: 3.5

  # Target durations per intensity level
  high_intensity_seconds: 4.0    # Energetic moments — quick but watchable
  medium_intensity_seconds: 6.0  # Standard pacing — the backbone
  low_intensity_seconds: 7.0     # Breathing room — let the viewer absorb

  # Snap clip durations to the nearest beat boundary so cuts feel musical
  snap_to_beats: true

  # Intensity thresholds (0.0 – 1.0)
  high_intensity_threshold: 0.65
  low_intensity_threshold: 0.35

  # Speed ramping — cinematic speed effects per intensity level
  speed_ramp_enabled: true
  high_intensity_speed: 1.2    # Slight fast-forward for energy
  medium_intensity_speed: 1.0  # Normal speed
  low_intensity_speed: 0.9     # Slow-motion for dreamy feel

  # Organic Per-Beat Speed Ramping (FEAT-036)
  # When enabled, playback speed varies smoothly within each clip driven by
  # the beat-by-beat intensity curve, creating a natural "breathing" feel.
  # Disable to use the simpler scalar speed_ramp_enabled instead.
  speed_ramp_organic: true
  speed_ramp_sensitivity: 0.5    # 0.5 = gentle, 1.0 = standard, 2.0 = aggressive
  speed_ramp_curve: linear  # linear | ease_in | ease_out | ease_in_out
  speed_ramp_min: 0.9            # Slowest multiplier (low-energy beats)
  speed_ramp_max: 1.1            # Fastest multiplier (high-energy beats)

  zoom_factor: 0.8
  # Test mode — uncomment or use --test-mode CLI flag for fast iteration
  # max_clips: 5                 # Maximum number of clip segments
  # max_duration_seconds: 30.0   # Maximum montage duration (seconds)

  # Clip variety — vary start position within clips each time they're reused
  clip_variety_enabled: true

  # B-Roll insertion settings (FEAT-011, FEAT-033)
  # B-roll clips are inserted at regular intervals to vary the visual content.
  # FEAT-033: B-roll insertion respects clip boundaries — the montage waits for
  # the current main clip to finish before switching to a B-roll clip, even if
  # the time threshold has been reached, ensuring smoother transitions.
  broll_interval_seconds: 20    # Insert B-roll approximately every N seconds
  broll_interval_variance: 2    # Randomize the interval by ± N seconds

  # Section detection — intensity-envelope based musical section awareness
  section_detection_enabled: true
  section_smoothing_window: 8     # Beats to smooth over (higher = fewer sections)
  section_change_threshold: 0.15  # Intensity change to trigger a boundary (0.0-1.0)

  # Beat-snap transitions — applied at musical section boundaries
  # Set to 'none' to keep hard cuts (default/current behaviour)
  # Options: 'fade', 'wipeleft', 'wiperight', 'slideup', 'slidedown', etc.
  transition_type: none
  transition_duration: 0.5        # Duration of each transition (seconds)

  # Duration sync tolerance — how far the rendered video duration is allowed
  # to drift from the planned timeline before the pipeline raises. Increase
  # to absorb larger FFmpeg xfade/rounding drift at the cost of slightly
  # looser beat-sync precision. Decrease for strict duration contracts.
  # Default: 0.10 (100ms). Typical range: 0.05 – 1.0.
  duration_sync_tolerance_seconds: 20.0

  # Video style — applies a uniform color grade to all clips
  # Options: 'none', 'bw' (black & white), 'vintage', 'warm', 'cool', 'golden'
  video_style: golden

  # Audio Overlay Visualizer (FEAT-013)
  # Options: 'none', 'waveform' (line), 'waveform_centered' (symmetric line),
  #          'bars' (frequency bars), 'spectrum' (scrolling spectrogram),
  #          'cqt' (constant-Q rainbow spectrogram)
  audio_overlay: waveform
  audio_overlay_opacity: 1.0
  audio_overlay_position: center
  audio_overlay_padding: 20  # Distance in pixels from the nearest screen edge (default: 10, range: 0+)
  #                              # Applies to both the horizontal (left/right) AND vertical (bottom) offset.

  # Color styling — applies to waveform / waveform_centered / bars.
  # For 'bars', a multi-color palette is distributed across frequency bands.
  # Palettes: 'none', 'warm', 'cool', 'sunset', 'neon', 'rainbow', 'mono', 'custom'.
  # 'none' and 'custom' both use audio_overlay_color; named palettes override it.
  audio_overlay_palette: sunset
  audio_overlay_color: white   # Hex (e.g. '#FF8800') or FFmpeg color name
  # Size — width as a fraction of video width (0.05–1.0), height in pixels (40–400).
  audio_overlay_width_pct: 0.6
  audio_overlay_height: 240

  # Text Overlay — cinematic cold open and lyrics (FEAT-045/046/047)
  # Enable to burn timed text into the final video.
  text_overlay_enabled: true       # Master switch — must be true for anything below to work

  # Cinematic cold open (0–7s): scene-setter wash + artist/song lower-third
  cold_open_enabled: true           # Set to false to skip the cold open entirely
  # In pipeline mode, per-track metadata overrides these global defaults (FEAT-048).
  # Pipeline tries: sidecar .meta.txt → config mapping → filename extraction
  # track_artist: "Bachata para bailar"                  # Artist name shown in the lower-third (4–7s)
  # track_title: "Mix 2026"                   # Song title shown alongside the artist name

  # LRC lyrics: synced subtitle track burned into the video
  # lyrics_overlay_enabled: true      # Set to false to keep cold open but skip lyrics
  # lyrics_lrc_path: ""               # Explicit path; leave empty for auto-discovery
  #                                   # Auto-discovery: looks for {audio_stem}.lrc next
  #                                   # to the audio file (e.g. track.wav → track.lrc)

  # Scene-setter wash text (0–4s): pulled from {audio_stem}.scene.txt if it exists,
  # then falls back to the most-repeated lyric line from the .lrc file.
  cold_open_wash_font_scale: 0.1   # Font size as fraction of video width (0.04–0.10)
  cold_open_wash_opacity: 0.7      # Wash text opacity 0.0–1.0 (0.35 = subtle)
  cold_open_wash_fade: 0.9          # Fade in/out duration in seconds

  # Intro effect — applies to the first segment only (FEAT-022)
  # Options: 'none', 'bloom' (gaussian reveal), 'vignette_breathe' (spotlight)
  intro_effect: none
  intro_effect_duration: 1.5

  # Pacing visual effects — applied to EVERY segment (FEAT-023)
  # pacing_drift_zoom: false         # Ken Burns slow zoom drift
  # pacing_crop_tighten: false       # Zoom-in over first 10s
  # pacing_saturation_pulse: false   # Beat-synced saturation surge

  # Advanced beat-synced effects (FEAT-024)
  # pacing_micro_jitters: false        # Beat-synced 2px shake
  # pacing_light_leaks: false          # Warm amber flashes on beats
  # pacing_warm_wash: false            # Amber flash at transitions
  # pacing_alternating_bokeh: false    # Blur on alternating segments

# Pipeline Configuration (Full Pipeline Mode)
# Controls per-track customization when running the full pipeline (src/pipeline.py)
# Each mapping uses the audio filename (e.g. 'track1.wav') as the key.
pipeline:
  # Per-Track Video Clip Pools (FEAT-030)
  # Assign dedicated clip folders to individual songs for visual variety.
  # If a track is listed here, its per-track video and Shorts use that folder;
  # the global --video-dir is used for the mix video and as a fallback.
  # Example:
  # track_clips:
  #   track1.wav: clips/track1/
  #   track2.wav: clips/track2/
  track_clips: {}

  # Per-Track Video Style Filters (FEAT-031)
  # Assign unique color grades to each track for visual distinction.
  # If a track is listed here, its per-track video and Shorts use that style;
  # the global video_style is used for the mix video and as a fallback.
  # Valid styles: 'none', 'bw', 'vintage', 'warm', 'cool', 'golden'
  # Example:
  # track_styles:
  #   track1.wav: vintage
  #   track2.wav: bw
  track_styles: {}

  # Per-Track Metadata for Text Overlays (FEAT-048)
  # Assign artist name and song title to each track for the cold open.
  # Extraction priority (fallback chain):
  #   1. Sidecar file: {track}.meta.txt (2 lines: artist, title)
  #   2. Config mapping below: per_track_metadata section
  #   3. Filename extraction: "Artist Name - Song Title.wav" format
  #   4. Empty (no text overlay)
  # Example:
  # per_track_metadata:
  #   track1.wav:
  #     artist: "Romeo Santos"
  #     title: "Propuesta Indecente"
  #   track2.wav:
  #     artist: "Juan Luis Guerra"
  #     title: "Bachata Rosa"
  per_track_metadata: {}

# Audio Mix Configuration
# Controls how multiple audio tracks are mixed when --audio points to a folder.
audio_mix:
  # Duration in seconds for the crossfade overlap between tracks.
  crossfade_duration_seconds: 2.0

  # BPM Tempo Sync (Phase 1) — DJ-style beat matching at track boundaries.
  # When enabled, the mixer pre-analyses each source track's BPM and applies
  # an FFmpeg atempo time-stretch to the incoming track so its tempo matches
  # the outgoing mix. This eliminates rhythmic clashing without pitch-shifting.
  # Disable with --no-tempo-sync on the CLI (or set to false here).
  tempo_sync: true

  # Maximum fractional tempo shift allowed. If the BPM difference would require
  # a larger stretch than this, sync is skipped for that transition to prevent
  # audio quality loss. 0.10 = up to ±10% (handles most real-world track pairs).
  sync_threshold: 0.10

  # [Phase 2 — not yet active] Gradually ramp tempo within the crossfade window.
  # tempo_ramp: false

# Compilation Configuration
# Automatically concatenate individual track videos into one long-form video
# with chapter markers for YouTube navigation (FEAT-049).
compilation:
  # Enable automatic compilation video generation at the end of the pipeline
  enabled: true  # Set to true to auto-generate compilation.mp4 after pipeline completes

  # Type of transition between track videos
  # Options: 'fade' (0.5s cross-fade), 'crossfade' (overlap), 'none' (hard cut)
  transition_type: fade
  transition_duration: 0.5  # Duration in seconds

  # Generate chapter markers JSON for YouTube description
  # Output: compilation_chapters.json with timestamps and track names
  include_chapter_markers: true
