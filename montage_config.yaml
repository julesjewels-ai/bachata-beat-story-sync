# Montage Pacing Configuration
# Adjust these values to control the feel of the video montage.
# All durations are in seconds.

pacing:
  # Genre preset — applies tuned defaults for a music style (FEAT-027)
  # Options: bachata, salsa, reggaeton, kizomba, merengue, pop
  # Explicit values below will override the preset.
  # genre: bachata
  # Hard floor — no clip will ever be shorter than this
  min_clip_seconds: 1.5

  # Target durations per intensity level
  high_intensity_seconds: 2.5    # Energetic moments — quick but watchable
  medium_intensity_seconds: 4.0  # Standard pacing — the backbone
  low_intensity_seconds: 6.0     # Breathing room — let the viewer absorb

  # Snap clip durations to the nearest beat boundary so cuts feel musical
  snap_to_beats: true

  # Intensity thresholds (0.0 – 1.0)
  high_intensity_threshold: 0.65
  low_intensity_threshold: 0.35

  # Speed ramping — cinematic speed effects per intensity level
  speed_ramp_enabled: true
  high_intensity_speed: 1.2    # Slight fast-forward for energy
  medium_intensity_speed: 1.0  # Normal speed
  low_intensity_speed: 0.7     # Slow-motion for dreamy feel

  # Test mode — uncomment or use --test-mode CLI flag for fast iteration
  # max_clips: 5                 # Maximum number of clip segments
  # max_duration_seconds: 30.0   # Maximum montage duration (seconds)

  # Clip variety — vary start position within clips each time they're reused
  clip_variety_enabled: true

  # Section detection — intensity-envelope based musical section awareness
  section_detection_enabled: true
  section_smoothing_window: 8     # Beats to smooth over (higher = fewer sections)
  section_change_threshold: 0.15  # Intensity change to trigger a boundary (0.0-1.0)

  # Beat-snap transitions — applied at musical section boundaries
  # Set to 'none' to keep hard cuts (default/current behaviour)
  # Options: 'fade', 'wipeleft', 'wiperight', 'slideup', 'slidedown', etc.
  transition_type: fade
  transition_duration: 0.5        # Duration of each transition (seconds)

  # Video style — applies a uniform color grade to all clips
  # Options: 'none', 'bw' (black & white), 'vintage', 'warm', 'cool', 'golden'
  video_style: golden

  # Audio Overlay Visualizer (FEAT-013)
  # Options: 'none', 'waveform' (line), 'bars' (frequency bars)
  # audio_overlay: none
  # audio_overlay_opacity: 0.5
  # audio_overlay_position: right
  # audio_overlay_padding: 10  # Distance in pixels from the nearest screen edge (default: 10, range: 0+)
  #                              # Applies to both the horizontal (left/right) AND vertical (bottom) offset.

  # Intro effect — applies to the first segment only (FEAT-022)
  # Options: 'none', 'bloom' (gaussian reveal), 'vignette_breathe' (spotlight)
  intro_effect: vignette_breathe
  intro_effect_duration: 1.5

  # Pacing visual effects — applied to EVERY segment (FEAT-023)
  # pacing_drift_zoom: false         # Ken Burns slow zoom drift
  # pacing_crop_tighten: false       # Zoom-in over first 10s
  # pacing_saturation_pulse: false   # Beat-synced saturation surge

  # Advanced beat-synced effects (FEAT-024)
  # pacing_micro_jitters: false        # Beat-synced 2px shake
  # pacing_light_leaks: false          # Warm amber flashes on beats
  # pacing_warm_wash: false            # Amber flash at transitions
  # pacing_alternating_bokeh: false    # Blur on alternating segments

# Audio Mix Configuration
# Controls how multiple audio tracks are mixed when --audio points to a folder.
audio_mix:
  # Duration in seconds for the crossfade overlap between tracks.
  crossfade_duration_seconds: 2.0

  # BPM Tempo Sync (Phase 1) — DJ-style beat matching at track boundaries.
  # When enabled, the mixer pre-analyses each source track's BPM and applies
  # an FFmpeg atempo time-stretch to the incoming track so its tempo matches
  # the outgoing mix. This eliminates rhythmic clashing without pitch-shifting.
  # Disable with --no-tempo-sync on the CLI (or set to false here).
  tempo_sync: true

  # Maximum fractional tempo shift allowed. If the BPM difference would require
  # a larger stretch than this, sync is skipped for that transition to prevent
  # audio quality loss. 0.10 = up to ±10% (handles most real-world track pairs).
  sync_threshold: 0.10

  # [Phase 2 — not yet active] Gradually ramp tempo within the crossfade window.
  # tempo_ramp: false
