name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      
    - name: Set up Python
      run: uv python install 3.13
      
    - name: Install dependencies
      run: |
        uv venv
        uv pip install -r requirements.txt
        uv pip install ruff pytest mypy types-PyYAML types-openpyxl
        
    - name: Check formatting
      run: |
        source .venv/bin/activate
        ruff format --check src/ tests/
        
    - name: Lint
      run: |
        source .venv/bin/activate
        ruff check src/ tests/
        
    - name: Type check
      run: |
        source .venv/bin/activate
        mypy src/ tests/
        
    - name: Run unit tests
      run: |
        source .venv/bin/activate
        pytest tests/unit/
